name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.x'

      - name: Download modules
        run: go mod download

      - name: Run tests
        run: go test ./...

      - name: Build services
        run: |
          go build ./cmd/auth-service
          go build ./cmd/task-service
          go build ./cmd/gateway
