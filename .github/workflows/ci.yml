name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24.x'

      - name: Download modules
        run: go mod download

      - name: Generate SQL code
        run: go run github.com/sqlc-dev/sqlc/cmd/sqlc@v1.29.0 generate

      - name: Run tests
        run: go test ./...

      - name: Build services
        run: |
          go build ./cmd/auth-service
          go build ./cmd/task-service
          go build ./cmd/gateway
