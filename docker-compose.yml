services:
  postgres:
    image: postgres:16-alpine
    container_name: task-tracker-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-task_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

  db-backup:
    image: postgres:16-alpine
    container_name: task-tracker-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-task_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-7}
      BACKUP_FILE_PREFIX: ${BACKUP_FILE_PREFIX:-task_tracker}
      BACKUP_RUN_ON_START: ${BACKUP_RUN_ON_START:-false}
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
    entrypoint: ["/bin/sh", "/scripts/db_backup_loop.sh"]

  auth-service:
    build:
      context: .
      args:
        SERVICE: auth-service
    environment:
      APP_NAME: auth-service
      PORT: 8081
      LOG_LEVEL: INFO
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      TOKEN_TTL_HOURS: ${TOKEN_TTL_HOURS:-24}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"

  task-service:
    build:
      context: .
      args:
        SERVICE: task-service
    environment:
      APP_NAME: task-service
      PORT: 8082
      LOG_LEVEL: INFO
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8082:8082"

  gateway:
    build:
      context: .
      args:
        SERVICE: gateway
    environment:
      APP_NAME: gateway
      PORT: 8080
      LOG_LEVEL: INFO
      AUTH_SERVICE_URL: ${AUTH_SERVICE_URL:-http://auth-service:8081}
      TASK_SERVICE_URL: ${TASK_SERVICE_URL:-http://task-service:8082}
      WEB_DIR: /app/web
      OPENAPI_PATH: /app/api/openapi.yaml
    depends_on:
      - auth-service
      - task-service
    ports:
      - "8080:8080"

  caddy:
    image: caddy:2-alpine
    container_name: task-tracker-caddy
    depends_on:
      - gateway
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:-:80}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployments/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
